<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADLER MIND 협동조합 설립서류 검토</title>
<meta property="og:type" content="website">
<meta property="og:locale" content="ko_KR">
<meta property="og:title" content="ADLER MIND 협동조합 설립서류 검토">
<meta property="og:description" content="발기인분들께서는 설립서류를 검토하고 의견을 남겨주십시오.">
<meta property="og:image" content="https://simjimind.github.io/adlermind/image/og-image.png">
<meta property="og:url" content="https://simjimind.github.io/adlermind/adlermind_charter_review.html">
<meta name="twitter:card" content="summary_large_image">
<style>
:root {
  --green: #555272;
  --green-light: #8e8cb0;
  --green-pale: #f0eff7;
  --cream: #f5f5f9;
  --text: #36344f;
  --muted: #6b7280;
  --border: #dcdbe8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Serif KR', 'Malgun Gothic', Georgia, serif;
  background: var(--cream);
  color: var(--text);
  font-size: 15px;
  line-height: 1.8;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--green);
  color: white;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.topbar label { font-size: 13px; opacity: 0.85; white-space: nowrap; }
.topbar select {
  padding: 5px 12px;
  border-radius: 20px;
  border: none;
  font-size: 14px;
  font-weight: bold;
  background: white;
  color: var(--green);
  cursor: pointer;
  min-width: 130px;
}
.topbar .title { flex: 1; font-size: 15px; font-weight: bold; letter-spacing: 0.05em; }
.hero {
  background: linear-gradient(135deg, #555272 0%, #42405e 100%);
  color: white;
  padding: 36px 24px 28px;
  text-align: center;
}
.hero h1 { font-size: 20px; font-weight: bold; margin-bottom: 8px; letter-spacing: 0.05em; }
.hero p { font-size: 13px; opacity: 0.85; line-height: 1.7; }
.jump-nav {
  display: flex;
  gap: 8px;
  padding: 12px 20px;
  background: white;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.jump-nav a {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  transition: all 0.15s;
}
.jump-nav a:hover {
  background: var(--green-pale);
  border-color: var(--green-light);
  color: var(--green);
}
.main { padding: 24px 20px; max-width: 960px; margin: 0 auto; }
.doc-section { margin-bottom: 32px; }
.doc-section h2 {
  font-size: 15px;
  font-weight: bold;
  color: white;
  background: var(--green);
  padding: 11px 18px;
  border-radius: 6px 6px 0 0;
  letter-spacing: 0.04em;
}
.doc-section iframe {
  display: block;
  width: 100%;
  height: 65vh;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 6px 6px;
  background: white;
}
.comment-section {
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 40px;
}
.comment-section h2 {
  font-size: 15px;
  font-weight: bold;
  color: var(--green);
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--green-pale);
}
.approval-grid {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.approval-card {
  flex: 1;
  min-width: 110px;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 8px;
  text-align: center;
  font-size: 13px;
}
.approval-card .name { font-weight: bold; margin-bottom: 2px; }
.approval-card .role { color: var(--muted); font-size: 11px; margin-bottom: 6px; }
.approval-card .badge {
  padding: 2px 9px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: bold;
}
.b-ok { background: #d1fae5; color: #065f46; }
.b-hold { background: #fef3c7; color: #92400e; }
.b-none { background: var(--green-pale); color: var(--muted); }
.comment-form label {
  display: block;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 5px;
  color: var(--muted);
}
.comment-form textarea {
  width: 100%;
  min-height: 90px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
  background: var(--cream);
}
.comment-form textarea:focus { outline: none; border-color: var(--green-light); }
.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.btn {
  padding: 8px 18px;
  border-radius: 6px;
  border: none;
  font-family: inherit;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
}
.btn-primary { background: var(--green); color: white; }
.btn-primary:hover { background: #42405e; }
.btn-ok { background: #059669; color: white; }
.btn-ok:hover { background: #047857; }
.btn-hold { background: #d97706; color: white; }
.btn-hold:hover { background: #b45309; }
.form-msg { margin-top: 7px; font-size: 13px; color: var(--green); min-height: 18px; }
.comments-list { margin-top: 22px; }
.comment-item {
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 12px 14px;
  margin-bottom: 10px;
  background: var(--cream);
}
.comment-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--muted);
}
.comment-author { font-weight: bold; color: var(--text); font-size: 14px; }
.comment-text { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.no-comment { color: var(--muted); font-size: 13px; text-align: center; padding: 16px 0; }
.comment-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.btn-sm {
  padding: 3px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: white;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  color: var(--muted);
  transition: all 0.15s;
}
.btn-sm:hover { background: var(--green-pale); color: var(--green); border-color: var(--green-light); }
.btn-danger:hover { background: #fee2e2 !important; color: #b91c1c !important; border-color: #fca5a5 !important; }
.edit-area {
  width: 100%;
  min-height: 70px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
  background: white;
  margin-top: 6px;
  display: block;
}
.edit-area:focus { outline: none; border-color: var(--green-light); }
.edit-actions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.reply-form {
  margin-top: 10px;
  padding: 12px;
  background: var(--green-pale);
  border-radius: 6px;
  border: 1px solid var(--border);
}
.reply-list { margin-top: 10px; padding-left: 16px; border-left: 3px solid var(--border); }
.reply-item {
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 6px;
  background: white;
}
</style>
</head>
<body>

<div class="topbar">
  <span class="title">ADLER MIND 협동조합 · 설립서류 검토</span>
  <label for="memberSelect">열람자</label>
  <select id="memberSelect" onchange="onMemberChange()">
    <option value="">-- 이름 선택 --</option>
    <option value="이경숙">이경숙 (이사장)</option>
    <option value="고미경">고미경 (이사)</option>
    <option value="신옥선">신옥선 (이사)</option>
    <option value="박정연">박정연 (감사)</option>
    <option value="김이수">김이수 (발기인대표)</option>
    <option value="김종금">김종금 (발기인)</option>
  </select>
</div>

<div class="hero">
  <h1>ADLER MIND 협동조합 설립서류 검토</h1>
  <p>최종 확정 서류입니다. 전문을 확인하신 후 맨 아래 의견란에 검토 의견을 남겨주십시오.</p>
</div>

<div class="jump-nav">
  <a href="#sec-charter">정관</a>
  <a href="#sec-business">사업계획서</a>
  <a href="#sec-budget">수입지출예산서</a>
  <a href="#sec-comment">발기인 의견</a>
</div>

<div class="main">

  <div class="doc-section" id="sec-charter">
    <h2>정관 (2026-06-20 최종 확정)</h2>
    <iframe src="02.pdf" title="ADLER MIND 협동조합 정관"></iframe>
  </div>

  <div class="doc-section" id="sec-business">
    <h2>사업계획서 (2026년도)</h2>
    <iframe src="06.pdf" title="사업계획서"></iframe>
  </div>

  <div class="doc-section" id="sec-budget">
    <h2>수입·지출 예산서 (2026년도)</h2>
    <iframe src="07.pdf" title="수입지출예산서"></iframe>
  </div>

  <div class="comment-section" id="sec-comment">
    <h2>발기인 의견</h2>

    <div class="approval-grid" id="approvalGrid"></div>

    <div class="comment-form">
      <p style="font-size:13px;color:var(--muted);margin-bottom:10px;">서류를 검토하신 의견을 남겨주십시오. 상단에서 이름을 먼저 선택하셔야 합니다.</p>
      <label for="commentText">의견 내용</label>
      <textarea id="commentText" placeholder="검토 의견, 질문, 수정 요청 등을 자유롭게 작성해 주세요."></textarea>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="submitComment()">의견 저장</button>
        <button class="btn btn-ok" onclick="submitApproval('동의')">동의</button>
        <button class="btn btn-hold" onclick="submitApproval('보류')">보류</button>
      </div>
      <div class="form-msg" id="formMsg"></div>
    </div>

    <div class="comments-list" id="commentsList">
      <div class="no-comment">의견을 불러오는 중...</div>
    </div>
  </div>

</div>

<script>
const SB_URL = 'https://vxnjrznlfofxymcobsmg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4bmpyem5sZm9meHltY29ic21nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNTIzOTgsImV4cCI6MjA5NTgyODM5OH0.UHu06FFxjhqISC1NaiayIjGCRGZ6ZaxM00Yu6xRH3KA';
const AREF = '발기인의견';

const MEMBERS = [
  { name: '이경숙', role: '이사장' },
  { name: '고미경', role: '이사' },
  { name: '신옥선', role: '이사' },
  { name: '박정연', role: '감사' },
  { name: '김이수', role: '발기인대표' },
  { name: '김종금', role: '발기인' },
];

let approvals = {};
let currentMember = '';
let allComments = [];

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(dt) {
  if (!dt) return '';
  return new Date(dt).toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function onMemberChange() {
  currentMember = document.getElementById('memberSelect').value;
  const own = allComments.find(c => c.member_name === currentMember && !c.parent_id);
  document.getElementById('commentText').value = own ? own.content : '';
  renderComments();
}

async function sbGet(path) {
  const res = await fetch(SB_URL+'/rest/v1/'+path, {
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  try { return await res.json(); } catch { return []; }
}

async function sbPost(path, body, prefer) {
  return fetch(SB_URL+'/rest/v1/'+path, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':prefer||'return=minimal'},
    body:JSON.stringify(body)
  });
}

async function sbPatch(path, body) {
  return fetch(SB_URL+'/rest/v1/'+path, {
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(body)
  });
}

async function sbDelete(path) {
  return fetch(SB_URL+'/rest/v1/'+path, {
    method:'DELETE',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
}

async function loadApprovals() {
  const data = await sbGet('charter_approvals?select=member_name,status');
  approvals = {};
  if (Array.isArray(data)) data.forEach(r=>{ approvals[r.member_name]=r.status; });
  renderApprovals();
}

function renderApprovals() {
  document.getElementById('approvalGrid').innerHTML = MEMBERS.map(m=>{
    const s = approvals[m.name];
    const cls = s==='동의'?'b-ok':s==='보류'?'b-hold':'b-none';
    return `<div class="approval-card">
      <div class="name">${m.name}</div>
      <div class="role">${m.role}</div>
      <span class="badge ${cls}">${s||'미응답'}</span>
    </div>`;
  }).join('');
}

async function loadComments() {
  const data = await sbGet('charter_comments?article_ref=eq.'+encodeURIComponent(AREF)+'&order=created_at.asc&select=id,member_name,content,created_at,parent_id,comment_type');
  allComments = Array.isArray(data) ? data : [];
  renderComments();
}

function renderComments() {
  const el = document.getElementById('commentsList');
  const top = allComments.filter(c=>!c.parent_id);
  if (!top.length) { el.innerHTML='<div class="no-comment">아직 의견이 없습니다.</div>'; return; }
  el.innerHTML = top.map(c=>{
    const replies = allComments.filter(r=>r.parent_id===c.id);
    return buildCommentHTML(c, replies);
  }).join('');
}

function buildCommentHTML(c, replies) {
  const isOwn = currentMember && c.member_name===currentMember;
  const replyItems = replies.map(r=>buildReplyHTML(r)).join('');
  const actions = [
    currentMember ? `<button class="btn-sm" onclick="toggleReplyForm('${c.id}')">답글</button>` : '',
    isOwn ? `<button class="btn-sm" onclick="startEdit('${c.id}')">수정</button>` : '',
    isOwn ? `<button class="btn-sm btn-danger" onclick="delComment('${c.id}')">삭제</button>` : '',
  ].filter(Boolean).join('');
  return `<div class="comment-item" id="ci-${c.id}">
    <div class="comment-meta"><span class="comment-author">${esc(c.member_name)}</span><span>${fmt(c.created_at)}</span></div>
    <div id="ct-${c.id}"><div class="comment-text">${esc(c.content||'')}</div></div>
    ${actions ? `<div class="comment-actions" id="ca-${c.id}">${actions}</div>` : ''}
    <div class="reply-form" id="rf-${c.id}" style="display:none">
      <textarea class="edit-area" id="rta-${c.id}" placeholder="답글을 입력하세요..."></textarea>
      <div class="edit-actions">
        <button class="btn btn-primary" style="font-size:13px;padding:5px 16px;" onclick="submitReply('${c.id}')">답글 저장</button>
        <button class="btn-sm" onclick="toggleReplyForm('${c.id}')">취소</button>
      </div>
    </div>
    ${replies.length ? `<div class="reply-list">${replyItems}</div>` : ''}
  </div>`;
}

function buildReplyHTML(r) {
  const isOwn = currentMember && r.member_name===currentMember;
  const actions = [
    isOwn ? `<button class="btn-sm" onclick="startEdit('${r.id}')">수정</button>` : '',
    isOwn ? `<button class="btn-sm btn-danger" onclick="delComment('${r.id}')">삭제</button>` : '',
  ].filter(Boolean).join('');
  return `<div class="reply-item" id="ci-${r.id}">
    <div class="comment-meta"><span class="comment-author">${esc(r.member_name)}</span><span>${fmt(r.created_at)}</span></div>
    <div id="ct-${r.id}"><div class="comment-text">${esc(r.content||'')}</div></div>
    ${actions ? `<div class="comment-actions" id="ca-${r.id}">${actions}</div>` : ''}
  </div>`;
}

function toggleReplyForm(pid) {
  const rf = document.getElementById('rf-'+pid);
  const visible = rf.style.display !== 'none';
  rf.style.display = visible ? 'none' : 'block';
  if (!visible) document.getElementById('rta-'+pid).focus();
}

function startEdit(id) {
  const item = allComments.find(c=>c.id===id);
  if (!item) return;
  const ct = document.getElementById('ct-'+id);
  const ca = document.getElementById('ca-'+id);
  ct.innerHTML = `<textarea class="edit-area" id="eta-${id}">${esc(item.content||'')}</textarea>
    <div class="edit-actions">
      <button class="btn btn-primary" style="font-size:13px;padding:5px 16px;" onclick="saveEdit('${id}')">저장</button>
      <button class="btn-sm" onclick="renderComments()">취소</button>
    </div>`;
  if (ca) ca.style.display = 'none';
  const ta = document.getElementById('eta-'+id);
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

async function saveEdit(id) {
  const area = document.getElementById('eta-'+id);
  if (!area) return;
  const text = area.value.trim();
  if (!text) { msg('내용을 입력해 주세요.'); return; }
  const res = await sbPatch(
    'charter_comments?id=eq.'+id+'&member_name=eq.'+encodeURIComponent(currentMember),
    {content: text}
  );
  if (res.ok || res.status===204) {
    await loadComments();
    msg('수정되었습니다.');
  } else {
    msg('수정 중 오류가 발생했습니다.');
  }
}

async function delComment(id) {
  if (!confirm('삭제하시겠습니까? 이 의견에 달린 답글도 함께 삭제됩니다.')) return;
  const res = await sbDelete('charter_comments?id=eq.'+id+'&member_name=eq.'+encodeURIComponent(currentMember));
  if (res.ok || res.status===204) {
    await loadComments();
    msg('삭제되었습니다.');
  } else {
    msg('삭제 중 오류가 발생했습니다.');
  }
}

async function submitReply(parentId) {
  if (!currentMember) { msg('상단에서 이름을 먼저 선택해 주세요.'); return; }
  const area = document.getElementById('rta-'+parentId);
  const text = area ? area.value.trim() : '';
  if (!text) { msg('답글 내용을 입력해 주세요.'); return; }
  const res = await sbPost('charter_comments',
    {member_name:currentMember, article_ref:AREF, content:text, parent_id:parentId, comment_type:'답글'},
    'return=minimal'
  );
  if (res.ok || res.status===201) {
    await loadComments();
    msg('답글이 저장되었습니다.');
  } else {
    msg('저장 중 오류가 발생했습니다.');
  }
}

async function submitComment() {
  if (!currentMember) { msg('상단에서 이름을 먼저 선택해 주세요.'); return; }
  const text = document.getElementById('commentText').value.trim();
  if (!text) { msg('의견 내용을 입력해 주세요.'); return; }
  const existing = allComments.find(c => c.member_name===currentMember && !c.parent_id);
  let res;
  if (existing) {
    res = await sbPatch(
      'charter_comments?id=eq.'+existing.id+'&member_name=eq.'+encodeURIComponent(currentMember),
      {content: text}
    );
  } else {
    res = await sbPost('charter_comments',
      {member_name:currentMember, article_ref:AREF, content:text, comment_type:'의견'},
      'return=minimal'
    );
  }
  if (res.ok || res.status===204 || res.status===201) {
    msg('의견이 저장되었습니다.');
    await loadComments();
  } else {
    msg('저장 중 오류가 발생했습니다.');
  }
}

async function submitApproval(status) {
  if (!currentMember) { msg('상단에서 이름을 먼저 선택해 주세요.'); return; }
  const res = await sbPost(
    'charter_approvals?on_conflict=member_name',
    {member_name:currentMember, status:status},
    'resolution=merge-duplicates,return=minimal'
  );
  if (res.ok || res.status===201) {
    msg(status+' 의사가 저장되었습니다.');
    await loadApprovals();
  } else {
    msg('저장 중 오류가 발생했습니다.');
  }
}

function msg(text) {
  const el = document.getElementById('formMsg');
  el.textContent = text;
  setTimeout(()=>{el.textContent='';}, 4000);
}

loadApprovals();
loadComments();
setInterval(()=>{ loadComments(); loadApprovals(); }, 30000);
